<!DOCTYPE html>
<html>
<head>
  <title>Books Catalog</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 20px;
      cursor: pointer;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .list, .details {
      width: 300px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px #ccc;
      text-align: left;
    }

    .book {
      cursor: pointer;
      margin: 5px 0;
      padding: 5px;
    }

    .book:hover {
      background: #eee;
    }
  </style>
</head>

<body>

  <h1>📚 Books Catalog</h1>

  <button onclick="loadBooks()">Get All Books</button>

  <div class="container">
    <div class="list">
      <h3>Books</h3>
      <div id="bookList"></div>
    </div>

    <div class="details">
      <h3>Details</h3>
      <div id="bookDetails">Click a book</div>
    </div>
  </div>

<script>
async function loadBooks() {
  const res = await fetch('/api/books');
  const data = await res.json();

  const list = document.getElementById('bookList');
  list.innerHTML = '';

  data.data.forEach(book => {
    const div = document.createElement('div');
    div.className = 'book';
    div.innerText = book.title;
    div.onclick = () => loadBook(book.id);
    list.appendChild(div);
  });
}

async function loadBook(id) {
  const res = await fetch('/api/books/' + id);
  const data = await res.json();
  const book = data.data;

  document.getElementById('bookDetails').innerHTML = `
    <b>Title:</b> ${book.title}<br>
    <b>Author:</b> ${book.author}<br>
    <b>Year:</b> ${book.year}<br>
    <b>Genre:</b> ${book.genre}<br>
    <b>Price:</b> $${book.price}<br><br>
    <b>Summary:</b> ${book.summary}
  `;
}
</script>

</body>
</html>
